<div class="flex min-h-screen bg-slate-50 text-slate-900">
  <aside
    class="flex w-60 shrink-0 flex-col border-r border-slate-200 bg-white"
    aria-label="Menu lateral"
  >
    <div class="border-b border-slate-200 px-4 py-4">
      <div class="font-bold tracking-tight text-slate-900">NexaGO</div>
      <div class="text-xs font-medium text-slate-500">Backoffice</div>
    </div>

    <nav class="flex flex-col gap-0.5 p-3" aria-label="Navegação principal">
      <a
        routerLink="/"
        [routerLinkActive]="['bg-slate-100', 'text-slate-900', 'font-semibold']"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900"
      >
        Painel
      </a>
      <a
        routerLink="/operacional"
        [routerLinkActive]="['bg-slate-100', 'text-slate-900', 'font-semibold']"
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-50 hover:text-slate-900"
      >
        Gestão operacional
      </a>
    </nav>
  </aside>

  <div class="flex min-w-0 flex-1 flex-col">
    <header
      class="flex flex-wrap items-center justify-end gap-3 border-b border-slate-200 bg-white px-5 py-3"
    >
      <div class="flex items-center gap-3" aria-live="polite">
        @if (auth.user(); as user) {
          <span class="max-w-[220px] truncate text-sm text-slate-600" [title]="user.email ?? ''">
            {{ user.email }}
          </span>
        }
        <button
          type="button"
          class="cursor-pointer rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm font-semibold text-slate-900 transition-colors hover:bg-slate-100"
          (click)="signOut()"
        >
          Sair
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-auto">
      <router-outlet />
    </div>
  </div>
</div>
