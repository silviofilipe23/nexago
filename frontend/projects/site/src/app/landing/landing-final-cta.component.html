<section class="relative px-4 py-24 md:px-6" aria-labelledby="cta-final">
  <div class="mx-auto max-w-4xl">
    <div
      #ctaWrap
      class="cta-wrap relative overflow-hidden rounded-3xl border border-white/10 bg-gradient-to-br from-violet-600/40 via-nexago-surface to-blue-600/35 px-8 py-14 text-center shadow-[var(--shadow-glow)] md:px-16"
    >
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_30%_20%,rgba(255,255,255,0.12),transparent_50%)]"
        aria-hidden="true"
      ></div>
      <h2 id="cta-final" class="relative text-balance text-3xl font-semibold tracking-tight text-white md:text-4xl">
        Comece sua jornada no esporte agora
      </h2>
      <p class="relative mx-auto mt-5 max-w-xl text-lg text-violet-100/85">
        Um ecossistema pensado para quem treina sério e joga com orgulho. Entre na NexaGO.
      </p>
      <a
        class="cta-button relative mt-10 inline-flex items-center justify-center rounded-2xl bg-white px-10 py-4 text-base font-semibold text-nexago-bg focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-violet-900"
        [href]="links.reserve"
      >
        Explorar arenas perto de mim
      </a>
      <p class="relative mt-4 text-xs text-violet-200/70">
        Sem burocracia • Sem complicacao • So jogar
      </p>
    </div>
  </div>
</section>
